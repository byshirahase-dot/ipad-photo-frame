<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Photo Frame</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ログイン画面 -->
  <div id="screen-login" class="screen active">
    <div class="center-box">
      <div class="icon">&#128444;</div>
      <h1>Photo Frame</h1>
      <p>Google Photos の写真を<br>スライドショー表示します</p>
      <button id="btn-login">Google でログイン</button>
    </div>
  </div>

  <!-- 写真選択画面 -->
  <div id="screen-picker" class="screen">
    <div class="center-box">
      <h2>表示する写真を選んでください</h2>
      <p id="picker-desc">下のボタンで Google Photos を開き、<br>表示したい写真やアルバムを選択してください</p>
      <div id="picker-loading">セッションを準備中…</div>
      <a id="picker-link" class="btn-primary" target="_blank" style="display:none">
        Google Photos で写真を選ぶ
      </a>
      <p id="picker-waiting" style="display:none">
        選択が終わったら、このページに戻ってください。<br>自動的にスライドショーが始まります。
      </p>
      <button id="btn-picker-logout" class="btn-sub">ログアウト</button>
    </div>
  </div>

  <!-- スライドショー画面 -->
  <div id="screen-slideshow" class="screen">
    <img id="photo-display" class="photo" alt="">
    <div id="overlay">
      <div id="clock"></div>
      <div id="overlay-bottom">
        <span id="photo-info"></span>
        <div>
          <button id="btn-reselect">写真を選び直す</button>
          <button id="btn-logout">ログアウト</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="app.js"></script>
</body>
</html>
